# Killswitch — Docker Compose (PostgreSQL + Backend + Frontend)
# Usage: docker compose up -d

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    container_name: killswitch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: killswitch
      POSTGRES_PASSWORD: killswitch_secret
      POSTGRES_DB: killswitch_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U killswitch -d killswitch_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Backend (Python + FastAPI) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: killswitch-backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy

  # --- Frontend (Next.js) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8002
        NEXT_PUBLIC_WS_URL: ws://localhost:8002
    container_name: killswitch-frontend
    restart: unless-stopped
    ports:
      - "3003:3000"
    depends_on:
      - backend

volumes:
  pgdata:
